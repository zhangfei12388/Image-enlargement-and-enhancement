<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - AI Image Enhancement | remove-bakg-img.cfd</title>
  <meta name="description" content="Contact AI Image Enhancement for support, feedback, or partnership inquiries.">
  <link rel="canonical" href="https://remove-bakg-img.cfd/contact.html">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <header class="gradient-bg text-white py-4 sticky top-0 z-40 shadow-lg">
    <div class="max-w-4xl mx-auto px-4">
      <a href="/" class="text-xl font-bold">🤖 AI Image Enhancement</a>
    </div>
  </header>
  
  <main class="max-w-2xl mx-auto px-4 py-12">
    <h1 class="text-3xl font-bold mb-4 text-center">Contact Us</h1>
    <p class="text-gray-600 text-center mb-8">We'd love to hear from you! Send us a message.</p>
    
    <form id="contactForm" class="bg-white rounded-2xl p-8 shadow-sm">
      <div class="mb-6">
        <label class="block font-medium mb-2">Your Email</label>
        <input type="email" id="contactEmail" required class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-purple-500 focus:ring-2 focus:ring-purple-200 outline-none" placeholder="you@example.com">
      </div>
      
      <div class="mb-6">
        <label class="block font-medium mb-2">Subject</label>
        <select id="contactSubject" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-purple-500 outline-none">
          <option>General Inquiry</option>
          <option>Technical Support</option>
          <option>Billing Question</option>
          <option>Feature Request</option>
          <option>Partnership</option>
        </select>
      </div>
      
      <div class="mb-6">
        <label class="block font-medium mb-2">Message</label>
        <textarea id="contactMessage" rows="5" required class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-purple-500 focus:ring-2 focus:ring-purple-200 outline-none resize-none" placeholder="How can we help you?"></textarea>
      </div>
      
      <button type="submit" class="w-full py-4 rounded-xl font-bold text-white gradient-bg text-lg hover:opacity-90 transition">Send Message ✉️</button>
      
      <div id="contactSuccess" class="hidden mt-6 p-4 bg-green-100 text-green-700 rounded-xl text-center">
        ✅ Message sent successfully! We'll get back to you soon.
      </div>
    </form>
    
    <div class="mt-12 text-center text-gray-600">
      <h2 class="font-bold text-lg mb-4">Other Ways to Reach Us</h2>
      <p>📧 support@remove-bakg-img.cfd</p>
    </div>
  </main>
  
  <footer class="text-center text-gray-400 py-8">
    <p>© 2026 <a href="/" class="text-purple-400">remove-bakg-img.cfd</a></p>
  </footer>
  
  <style>
    .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
  </style>
  
  <script>
    document.getElementById('contactForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('contactEmail').value;
      const subject = document.getElementById('contactSubject').value;
      const message = document.getElementById('contactMessage').value;
      
      // Store locally for demo (in production, send to backend/API)
      const contact = { email, subject, message, date: new Date().toISOString() };
      const contacts = JSON.parse(localStorage.getItem('contact_messages') || '[]');
      contacts.push(contact);
      localStorage.setItem('contact_messages', JSON.stringify(contacts));
      
      document.getElementById('contactSuccess').classList.remove('hidden');
      document.getElementById('contactForm').reset();
      
      setTimeout(() => {
        document.getElementById('contactSuccess').classList.add('hidden');
      }, 5000);
    });
  </script>
</body>
</html>
